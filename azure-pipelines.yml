  - stage: Deploy
    displayName: Deploy to AKS
    dependsOn: Build
    jobs:
      - job: DeployAKS
        displayName: Apply Kubernetes Manifests
        steps:
          - checkout: self

          - task: Kubernetes@1
            displayName: Apply namespaces
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'aks-serviceaccount-connection'
              command: 'apply'
              useConfigurationFile: true
              configuration: 'k8s/00-namespaces.yaml'

          - task: Kubernetes@1
            displayName: Apply postgres resources
            inputs:
              connectionType: 'Kubernetes Service Connection'
              kubernetesServiceEndpoint: 'aks-serviceaccount-connection'
              command: 'apply'
              useConfigurationFile: true
              configuration: 'k8s/postgres'

