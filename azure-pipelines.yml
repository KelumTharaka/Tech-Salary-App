trigger:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  RG_NAME: techsalary-rg
  AKS_NAME: techsalary-aks
  ACR_LOGIN_SERVER: techsalaryacr12345.azurecr.io

stages:
  - stage: Build
    jobs:
      - job: BuildPush
        steps:
          - checkout: self

          - task: Docker@2
            inputs:
              containerRegistry: 'acr-service-connection'
              repository: 'frontend'
              command: 'buildAndPush'
              Dockerfile: 'frontend/Dockerfile'
              buildContext: 'frontend'
              tags: |
                latest
                $(Build.BuildId)

          - task: Docker@2
            inputs:
              containerRegistry: 'acr-service-connection'
              repository: 'bff-service'
              command: 'buildAndPush'
              Dockerfile: 'bff-service/Dockerfile'
              buildContext: 'bff-service'
              tags: |
                latest
                $(Build.BuildId)

          - task: Docker@2
            inputs:
              containerRegistry: 'acr-service-connection'
              repository: 'stats-service'
              command: 'buildAndPush'
              Dockerfile: 'stats-service/Dockerfile'
              buildContext: 'stats-service'
              tags: |
                latest
                $(Build.BuildId)

  - stage: Deploy
    dependsOn: Build
    jobs:
      - job: DeployAKS
        steps:
          - checkout: self

          - task: AzureCLI@2
            inputs:
              azureSubscription: 'azure-service-connection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az aks get-credentials --resource-group $(RG_NAME) --name $(AKS_NAME) --overwrite-existing

                sed -i "s|YOUR_ACR.azurecr.io|$(ACR_LOGIN_SERVER)|g" k8s/frontend/01-deployment.yaml
                sed -i "s|YOUR_ACR.azurecr.io|$(ACR_LOGIN_SERVER)|g" k8s/bff-service/02-deployment.yaml
                sed -i "s|YOUR_ACR.azurecr.io|$(ACR_LOGIN_SERVER)|g" k8s/stats-service/02-deployment.yaml

                kubectl apply -f k8s/00-namespaces.yaml
                kubectl apply -f k8s/postgres/
                kubectl apply -f k8s/stats-service/
                kubectl apply -f k8s/bff-service/
                kubectl apply -f k8s/frontend/
                kubectl apply -f k8s/ingress/