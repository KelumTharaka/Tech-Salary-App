apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: data
data:
  01-schema.sql: |
    CREATE SCHEMA IF NOT EXISTS identity;
    CREATE SCHEMA IF NOT EXISTS salary;
    CREATE SCHEMA IF NOT EXISTS community;

    CREATE TABLE IF NOT EXISTS identity.users (
        id SERIAL PRIMARY KEY,
        username VARCHAR(50) UNIQUE NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL,
        first_name VARCHAR(100),
        last_name VARCHAR(100),
        password_hash VARCHAR(255) NOT NULL,
        is_active BOOLEAN DEFAULT TRUE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS identity.roles (
        id SERIAL PRIMARY KEY,
        name VARCHAR(50) UNIQUE NOT NULL
    );

    CREATE TABLE IF NOT EXISTS identity.user_roles (
        user_id INTEGER REFERENCES identity.users(id) ON DELETE CASCADE,
        role_id INTEGER REFERENCES identity.roles(id) ON DELETE CASCADE,
        PRIMARY KEY (user_id, role_id)
    );

    INSERT INTO identity.roles (name)
    VALUES ('USER'), ('ADMIN')
    ON CONFLICT DO NOTHING;

    CREATE TABLE IF NOT EXISTS salary.salary_submissions (
        id SERIAL PRIMARY KEY,
        job_title VARCHAR(100) NOT NULL,
        company VARCHAR(100) NOT NULL,
        location VARCHAR(100) NOT NULL,
        salary_amount DECIMAL(12, 2) NOT NULL,
        currency VARCHAR(10) DEFAULT 'LKR',
        years_experience INTEGER NOT NULL,
        status VARCHAR(20) DEFAULT 'PENDING' CHECK (status IN ('PENDING', 'APPROVED', 'REJECTED')),
        is_anonymous BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    CREATE INDEX IF NOT EXISTS idx_salary_search
    ON salary.salary_submissions(job_title, company, location)
    WHERE status = 'APPROVED';

    CREATE INDEX IF NOT EXISTS idx_salary_stats_filters
    ON salary.salary_submissions(job_title, location, years_experience)
    WHERE status = 'APPROVED';

    CREATE TABLE IF NOT EXISTS community.votes (
        id SERIAL PRIMARY KEY,
        salary_submission_id INTEGER NOT NULL,
        user_id INTEGER NOT NULL,
        vote_type VARCHAR(10) CHECK (vote_type IN ('UP', 'DOWN')),
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(salary_submission_id, user_id)
    );

    CREATE TABLE IF NOT EXISTS community.reports (
        id SERIAL PRIMARY KEY,
        salary_submission_id INTEGER NOT NULL,
        user_id INTEGER NOT NULL,
        reason TEXT,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

