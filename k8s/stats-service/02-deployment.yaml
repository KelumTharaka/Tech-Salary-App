apiVersion: apps/v1
kind: Deployment
metadata:
  name: stats-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: stats-service
  template:
    metadata:
      labels:
        app: stats-service
    spec:
      containers:
        - name: stats-service
          image: techsalaryacrkelum01.azurecr.io/stats-service:latest
          ports:
            - containerPort: 8006
          envFrom:
            - configMapRef:
                name: stats-service-config