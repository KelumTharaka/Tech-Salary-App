apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-service
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff-service
  template:
    metadata:
      labels:
        app: bff-service
    spec:
      containers:
        - name: bff-service
          image: techsalaryacrkelum01.azurecr.io/bff-service:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: bff-config